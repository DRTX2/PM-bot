services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    
    extra_hosts:
      - "host.docker.internal:host-gateway"
volumes:
  n8n_data:
networks:
  default:
    name: automatizacion
    external: true

